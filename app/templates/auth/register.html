{% extends 'layout/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<h1 class="text-success text-center mt-2">REGISTER</h1>

{% if err_msg %}
<div class="alert alert-danger">{{err_msg}}</div>
{% endif %}

<form method="post" action="{{ url_for('auth.register') }}" enctype="multipart/form-data">
    <div class="form-floating mb-3 mt-3">
        <input type="text" class="form-control" id="name" placeholder="Enter Full name" name="name" required/>
        <label for="name">Full name</label>
    </div>

    <div class="form-floating mb-3 mt-3">
        <input type="text" class="form-control" id="email" placeholder="Enter email" name="email" required/>
        <label for="email">Email</label>
    </div>

    <div class="form-floating mt-3 mb-3">
        <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="password" required/>
        <label for="pwd">Password</label>
    </div>

    <div class="form-floating mt-3 mb-3">
        <input type="password" class="form-control" id="confirm" placeholder="Enter confirm password" name="confirm"
               required/>
        <label for="confirm">Confirm password</label>
    </div>

    <div class="form-floating mt-3 mb-3">
        <input type="file" class="form-control" id="avatar" name="avatar"/>
        <label for="avatar">Avatar</label>
    </div>

    <div class="form-floating mt-3 mb-3">
        <button type="submit" class="btn btn-danger">Submit</button>
    </div>
</form>
{% endblock %}
