<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">

        <a class="navbar-brand" href="/">Movie</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#genreNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="genreNav">
            <ul class="navbar-nav me-auto">

                {% for g in genres %}
                <li class="nav-item">
                    <a class="nav-link" href="/?genre_id={{ g.id}}">
                        {{ g.name }}
                    </a>
                </li>
                {% endfor %}

            </ul>

            <form method="get" action="/" class="d-flex">
                <input class="form-control me-2" type="text" placeholder="Keyword" name="kw"/>
                <button class="btn btn-primary" type="submit">Search</button>
            </form>
        </div>

        {% if current_user.is_authenticated %}
        <li class="nav-item">
            <a class="nav-link text-danger" href="/">
                <img src="{{ current_user.avatar }}" class="rounded-circle" width="40"/>
                Chào {{ current_user.name }}!
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-danger" href="{{ url_for('auth.logout') }}">Đăng xuất</a>
        </li>
        {% else %}
        <li class="nav-item">
            <a class="nav-link text-danger" href="{{ url_for('auth.login', next='/') }}">Đăng nhập</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-success" href="{{ url_for('auth.register') }}">Đăng ký</a>
        </li>
        {% endif %}

    </div>
</nav>
