<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">Movie</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#genreNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mynavbar">

            <ul class="navbar-nav me-auto mb-2 mb-sm-0 align-items-center">
                <li class="nav-item me-3 d-flex align-items-center">
                    <select id="genreSelect"
                            class="form-select form-select-sm bg-dark text-white border-secondary"
                            style="min-width: 180px;">
                        <option value="">Genres</option>
                        {% for g in genres %}
                        <option value="{{ g.id }}"
                            {% if request.args.get('genre_id') == g.id|string %}selected{% endif %}>
                            {{ g.name }}
                        </option>
                        {% endfor %}
                    </select>
                </li>
            </ul>

            <form method="get" action="/" class="d-flex">
                <input class="form-control me-2" type="text" placeholder="Keyword" name="kw"/>
                <button class="btn btn-primary" type="submit">Search</button>
            </form>
        </div>

    </div>

    {% if current_user.is_authenticated %}
    <li class="nav-item">
        <a class="nav-link text-danger" href="/">
            <img src="{{ current_user.avatar }}" class="rounded-circle" width="40"/>
        </a>
    </li>
    <li class="nav-item">
        <a class="btn btn-danger" href="{{ url_for('auth.logout') }}">Logout</a>
    </li>
    {% else %}
    <li class="nav-item">
        <a class="btn btn-danger" href="{{ url_for('auth.login', next='/') }}">Login</a>
    </li>
    <li class="nav-item">
        <a class="btn btn-success" href="{{ url_for('auth.register') }}">Register</a>
    </li>
    {% endif %}
</nav>
